name: Healthcheck

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Terraform Deployment"]
    types:
      - completed


jobs:
  healthcheck:
    runs-on: ubuntu-latest
    steps:
      - name: URL Health Check
        uses: jtalk/url-health-check-action@v5
        with:
          url: https://mohsin430.com|https://ecs.mohsin430.com
          max-attempts: 5
          retry-delay: 5s